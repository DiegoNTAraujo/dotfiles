general {
    # Use hyprlock unless it's already running
    lock_cmd = pidof hyprlock || hyprlock

    # Lock the session before the system goes to sleep
    before_sleep_cmd = loginctl lock-session

    # Turn the display back on after waking (prevents needing two keypresses)
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Dim screen to 10% after 15 minutes
listener {
    timeout = 900
    on-timeout = brightnessctl --save s 10%
    on-resume = brightnessctl -r
}

# Turn off keyboard backlight after 15 minutes
listener {
    timeout = 900
    on-timeout = brightnessctl -sd platform::kbd_backlight set 0
    on-resume = brightnessctl -rd platform::kbd_backlight
}

# Lock the screen after 30 minutes of inactivity
listener {
    timeout = 1800
    on-timeout = loginctl lock-session
}

# Turn off the display after 30 minutes
listener {
    timeout = 1800
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on && brightnessctl -r
}

# Suspend the system after 1 hour
listener {
    timeout = 3600
    on-timeout = systemctl suspend
}
